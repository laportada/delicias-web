{% extends "base.html" %}

{% block title %}Login & Registro - Delicias Web{% endblock %}

{% block content %}
<section id="auth-section">
    <div class="auth-container">
        <div class="auth-box">
            <h2>Login</h2>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn">Ingresar</button>
            </form>
        </div>

        <div class="auth-box">
            <h2>Registrarse</h2>
            <form method="POST" action="{{ url_for('registro') }}">
                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="email_reg">Email:</label>
                    <input type="email" id="email_reg" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password_reg">Contraseña (mínimo 8 caracteres):</label>
                    <input type="password" id="password_reg" name="password" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirm">Confirmar Contraseña:</label>
                    <input type="password" id="confirm" name="confirm_password" required minlength="8">
                </div>
                <button type="submit" class="btn">Registrarse</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
